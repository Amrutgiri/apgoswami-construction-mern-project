services:
  - type: web
    name: construction-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Super Admin
      - key: APP_BASE_URL
        sync: false
    disks:
      - name: uploadsDisk
        mountPath: /opt/render/project/src/backend/uploads
        sizeGB: 1
